# Render Blueprint for the agent backend.
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo (branch
# data-investigator-agent-scaffold). Render reads this file, builds agent/Dockerfile,
# and prompts for ANTHROPIC_API_KEY (marked sync:false, so it's never in the repo).
#
# Free plan sleeps after ~15 min idle; the committed recorded run covers the cold
# start. Update ALLOWED_ORIGINS if the Vercel URL changes.
services:
  - type: web
    name: data-investigator-agent
    runtime: docker
    plan: free
    region: oregon
    branch: data-investigator-agent-scaffold
    rootDir: agent
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set in the Render dashboard — never committed
      - key: MODEL
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGINS
        value: https://web-mu-three-lu56la822j.vercel.app
      - key: MAX_STEPS
        value: "15"
      - key: SANDBOX_MEM_MB
        value: "350" # keep the sandbox child under the 512MB free instance
