# Render Blueprint for the agent backend.
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo (branch
# main). Render reads this file, builds agent/Dockerfile, and prompts for
# ANTHROPIC_API_KEY (marked sync:false, so it's never in the repo).
#
# Free plan sleeps after ~15 min idle; the committed recorded run covers the cold
# start. Update ALLOWED_ORIGINS if the Vercel URL changes.
services:
  - type: web
    name: data-investigator-agent
    runtime: docker
    plan: free
    region: oregon
    branch: main
    rootDir: agent
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set in the Render dashboard, never committed
      - key: MODEL
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGINS
        value: https://investigator.natebowers.dev,https://web-mu-three-lu56la822j.vercel.app
      - key: MAX_STEPS
        value: "15"
      - key: SANDBOX_MEM_MB
        # RLIMIT_AS hint only. The child floors it so numpy can import; the real
        # bound on the free box is the OS OOM-killer plus the CPU + wall-clock caps.
        value: "350"
