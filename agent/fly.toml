# Fly.io config for the agent backend.
# Deploy:  fly launch --no-deploy  (first time, then set the app name)
#          fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#          fly deploy
app = "data-investigator-agent"
primary_region = "sea"  # pick an uncongested region at deploy time

[build]

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on: never idle-sleep, so a long-lived SSE demo can't get killed
  # mid-stream and the first interviewer click isn't a cold start.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024  # host RAM; the sandbox itself is capped to SANDBOX_MEM_MB
